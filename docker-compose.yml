version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    container_name: dtf_optimizer_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dtf_optimizer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dtf_optimizer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
