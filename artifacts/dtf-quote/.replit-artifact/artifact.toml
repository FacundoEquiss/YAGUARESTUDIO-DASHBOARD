kind = "web"
previewPath = "/"
title = "DTF Quote"
version = "1.0.0"
id = "artifacts/dtf-quote"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20938
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dtf-quote run dev"

[services.env]
PORT = "20938"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dtf-quote", "run", "build"]
publicDir = "artifacts/dtf-quote/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
