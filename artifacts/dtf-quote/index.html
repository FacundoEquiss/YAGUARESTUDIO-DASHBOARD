<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Cotizado</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23f97316'/><rect x='15' y='20' width='70' height='50' fill='none' stroke='white' stroke-width='3'/><line x1='20' y1='35' x2='80' y2='35' stroke='white' stroke-width='2'/><line x1='20' y1='45' x2='80' y2='45' stroke='white' stroke-width='2'/><line x1='20' y1='55' x2='80' y2='55' stroke='white' stroke-width='2'/><rect x='25' y='75' width='50' height='8' fill='white' rx='2'/></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      const originalTitle = 'Cotizado';
      const awayTitle = '¡Hey, volvé a cotizar! 🖨️';
      
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          document.title = awayTitle;
        } else {
          document.title = originalTitle;
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
